<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Eye Health PDF Viewer</title>
  <style>
    :root {
      --bg-color: #121212;
      --panel-bg: #1e1e1e;
      --text-color: #ffffff;
      --page-bg: #c0c0c0; /* Default grey for eye health */
      --tab-bg: #2a2a2a;
      --tab-active-bg: #121212;
    }
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      background-color: var(--panel-bg);
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
      z-index: 10;
    }
    .header h1 {
      margin: 0;
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .controls {
      display: flex;
      gap: 20px;
      align-items: center;
    }
    .file-input-wrapper {
      position: relative;
      overflow: hidden;
      display: inline-block;
    }
    .btn {
      background: #4facfe;
      color: #fff;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s, transform 0.1s;
    }
    .btn:hover {
      background: #00f2fe;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .file-input-wrapper input[type=file] {
      font-size: 100px;
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0;
      cursor: pointer;
    }
    .color-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-picker input[type="color"] {
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      background: none;
    }
    
    /* Tabs */
    .tabs-container {
      display: flex;
      background-color: var(--panel-bg);
      padding: 0 10px;
      gap: 5px;
      overflow-x: auto;
    }
    .tab {
      background-color: var(--tab-bg);
      padding: 10px 20px;
      border-top-left-radius: 8px;
      border-top-right-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.9rem;
      transition: background-color 0.2s;
      max-width: 200px;
      white-space: nowrap;
    }
    .tab.active {
      background-color: var(--tab-active-bg);
      font-weight: bold;
    }
    .tab-title {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tab-close {
      background: transparent;
      border: none;
      color: #aaa;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      margin-left: 5px;
    }
    .tab-close:hover {
      color: #ff4d4d;
    }

    #main-content {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    
    .pdf-render-area {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow-y: auto;
      padding: 40px 20px;
      display: none; /* hidden by default */
      flex-direction: column;
      align-items: center;
      gap: 30px;
    }
    .pdf-render-area.active {
      display: flex;
    }

    .page-wrapper {
      background-color: var(--page-bg);
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      border-radius: 8px;
      overflow: hidden;
      transition: background-color 0.3s;
      max-width: 100%;
      flex-shrink: 0;
      position: relative;
    }
    .screenshot-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s, background 0.3s;
      z-index: 5;
      font-size: 1.2rem;
    }
    .page-wrapper:hover .screenshot-btn {
      opacity: 1;
    }
    .screenshot-btn:hover {
      background: #4facfe;
    }
    canvas {
      display: block;
      mix-blend-mode: multiply;
      max-width: 100%;
      height: auto;
    }
    
    /* Loading state */
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-top: 4px solid #4facfe;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .empty-state {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #888;
    }
    .empty-state svg {
      width: 100px;
      height: 100px;
      margin-bottom: 20px;
      fill: #555;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Eye Health PDF Viewer</h1>
    <div class="controls">
      <div class="color-picker" title="Adjust page background color">
        <label for="bg-color-picker">Page Tone:</label>
        <input type="color" id="bg-color-picker" value="#c0c0c0">
      </div>
      <div class="file-input-wrapper">
        <button class="btn">Open PDF</button>
        <!-- Added multiple attribute to allow multiple file selection at once -->
        <input type="file" id="file-input" accept="application/pdf" multiple />
      </div>
    </div>
  </div>

  <div class="tabs-container" id="tabs-container"></div>

  <div id="main-content">
    <div class="empty-state" id="empty-state">
      <svg viewBox="0 0 24 24">
        <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
      </svg>
      <h2>No PDF Loaded</h2>
      <p>Click "Open PDF" to select files from your computer.</p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    const fileInput = document.getElementById('file-input');
    const colorPicker = document.getElementById('bg-color-picker');
    const tabsContainer = document.getElementById('tabs-container');
    const mainContent = document.getElementById('main-content');
    const emptyState = document.getElementById('empty-state');

    let pdfs = {};
    let activePdfId = null;
    let nextPdfId = 1;

    colorPicker.addEventListener('input', (e) => {
      document.documentElement.style.setProperty('--page-bg', e.target.value);
    });

    fileInput.addEventListener('change', function(e) {
      const files = e.target.files;
      if(files.length === 0) return;
      
      for(let i = 0; i < files.length; i++) {
        const file = files[i];
        if(file.type !== 'application/pdf') {
          alert(`Skipped ${file.name} because it is not a valid PDF.`);
          continue;
        }
        openPdfFile(file);
      }
      
      // Reset input so the same file can be selected again if needed
      fileInput.value = '';
    });

    function openPdfFile(file) {
      const id = 'pdf_' + nextPdfId++;
      
      // Create Tab Element
      const tab = document.createElement('div');
      tab.className = 'tab';
      tab.innerHTML = `
        <span class="tab-title" title="${file.name}">${file.name}</span>
        <button class="tab-close">&times;</button>
      `;
      tab.onclick = () => switchTab(id);
      tab.querySelector('.tab-close').onclick = (e) => {
        e.stopPropagation();
        closeTab(id);
      };
      tabsContainer.appendChild(tab);

      // Create Render Area Element
      const renderArea = document.createElement('div');
      renderArea.className = 'pdf-render-area';
      renderArea.id = id;
      
      const loader = document.createElement('div');
      loader.className = 'loader';
      renderArea.appendChild(loader);
      
      mainContent.appendChild(renderArea);

      pdfs[id] = {
        id,
        file,
        tab,
        renderArea,
        loader,
        pdfDoc: null
      };

      // Switch to this new tab
      switchTab(id);
      
      // Load PDF
      const fileReader = new FileReader();
      fileReader.onload = function() {
        const typedarray = new Uint8Array(this.result);
        pdfjsLib.getDocument(typedarray).promise.then(pdf => {
          pdfs[id].pdfDoc = pdf;
          renderAllPages(id).then(() => {
            if (pdfs[id]) pdfs[id].loader.style.display = 'none';
          }).catch(err => {
            if (pdfs[id]) pdfs[id].loader.style.display = 'none';
            console.error(err);
            alert('Error rendering PDF: ' + err.message);
          });
        }).catch(err => {
          if (pdfs[id]) pdfs[id].loader.style.display = 'none';
          console.error(err);
          alert('Error loading PDF: ' + err.message);
        });
      };
      fileReader.readAsArrayBuffer(file);
    }

    function switchTab(id) {
      if(!pdfs[id]) return;
      activePdfId = id;
      
      emptyState.style.display = 'none';

      // Update tabs and render areas visibility
      Object.values(pdfs).forEach(pdf => {
        if(pdf.id === id) {
          pdf.tab.classList.add('active');
          pdf.renderArea.classList.add('active');
        } else {
          pdf.tab.classList.remove('active');
          pdf.renderArea.classList.remove('active');
        }
      });
    }

    function closeTab(id) {
      const pdf = pdfs[id];
      if(!pdf) return;

      // Remove DOM elements
      pdf.tab.remove();
      pdf.renderArea.remove();
      delete pdfs[id];

      // If active, switch to another tab or show empty state
      if(activePdfId === id) {
        const remainingIds = Object.keys(pdfs);
        if(remainingIds.length > 0) {
          switchTab(remainingIds[remainingIds.length - 1]);
        } else {
          activePdfId = null;
          emptyState.style.display = 'block';
        }
      }
    }

    async function renderAllPages(id) {
      const pdf = pdfs[id];
      if(!pdf || !pdf.pdfDoc) return;

      for(let pageNum = 1; pageNum <= pdf.pdfDoc.numPages; pageNum++) {
        // If the tab was closed while rendering, abort
        if(!pdfs[id]) break;

        const page = await pdf.pdfDoc.getPage(pageNum);
        const viewport = page.getViewport({ scale: 1.5 });
        
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        const screenshotBtn = document.createElement('button');
        screenshotBtn.className = 'screenshot-btn';
        screenshotBtn.innerHTML = '📸';
        screenshotBtn.title = 'Save Screenshot';
        screenshotBtn.onclick = () => {
          const offscreenCanvas = document.createElement('canvas');
          offscreenCanvas.width = canvas.width;
          offscreenCanvas.height = canvas.height;
          const offCtx = offscreenCanvas.getContext('2d');
          
          offCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--page-bg').trim() || '#c0c0c0';
          offCtx.fillRect(0, 0, offscreenCanvas.width, offscreenCanvas.height);
          offCtx.globalCompositeOperation = 'multiply';
          offCtx.drawImage(canvas, 0, 0);
          
          offscreenCanvas.toBlob(async (blob) => {
            try {
              const item = new ClipboardItem({ 'image/png': blob });
              await navigator.clipboard.write([item]);
              
              // Visual feedback
              const originalText = screenshotBtn.innerHTML;
              screenshotBtn.innerHTML = '✅ Copied!';
              screenshotBtn.style.backgroundColor = '#4facfe';
              setTimeout(() => { 
                screenshotBtn.innerHTML = originalText;
                screenshotBtn.style.backgroundColor = '';
              }, 1500);
            } catch (err) {
              console.error('Failed to copy: ', err);
              alert('Clipboard access denied or unsupported. Please ensure permissions are granted.');
            }
          }, 'image/png');
        };
        
        wrapper.appendChild(canvas);
        wrapper.appendChild(screenshotBtn);
        pdf.renderArea.insertBefore(wrapper, pdf.loader);
        
        const renderContext = {
          canvasContext: ctx,
          viewport: viewport
        };
        
        await page.render(renderContext).promise;
      }
    }
  </script>
</body>
</html>
